---
# Configure sizes for bosh-lite on gcp.
# n2-standard-16 (16 vCPU / 64 GB): the whole cf-deployment runs as warden
# containers on this single director VM; on Ubuntu Noble each container runs a
# full systemd PID 1, so 32 GB (n2-standard-8) overcommits memory and a random
# instance-group agent fails to boot ("Timed out pinging VM"). 64 GB gives headroom.
- type: replace
  path: /resource_pools/name=vms/cloud_properties/machine_type
  value: n2-standard-16
- type: replace
  path: /disk_pools/name=disks/disk_size
  value: 250000
- type: replace
  path: /resource_pools/name=vms/cloud_properties/root_disk_size_gb
  value: 32
# Cost-tracking labels required by the CF infra owners. The google CPI applies
# these as GCP labels on the director VM. env_name is supplied via -v by
# create-director-override.sh. (The CPI has no equivalent for disks, so the
# director's disks are labeled with gcloud in the create workflow instead.)
- type: replace
  path: /resource_pools/name=vms/cloud_properties/labels?
  value:
    belongs-to: cli
    environment: ((env_name))
