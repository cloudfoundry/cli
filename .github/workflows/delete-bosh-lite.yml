name: Delete environment
on:
  workflow_dispatch:
    inputs:
      env-name:
        description: Env name to delete
        required: true
        type: string
  workflow_call:
    inputs:
      env-name:
        required: true
        type: string

env:
  BBL_IAAS: gcp
  BBL_GCP_REGION: us-east1
  BBL_GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_CREDENTIALS_JSON }}
  BOSH_DEPLOYMENT: cf
  BOSH_NON_INTERACTIVE: true
  ENV_NAME: ${{ inputs.env-name }}
  BBL_CLI_VERSION: ${{ vars.BBL_CLI_VERSION }}
  BOSH_CLI_VERSION: ${{ vars.BOSH_CLI_VERSION }}

jobs:
  delete-env:
    runs-on: ubuntu-latest
    outputs:
      envName: ${{steps.setup-bbl-env.outputs.env_name}}
    steps:
      - name: Install Tools
        run: |
          go version

          install_location=/usr/local/bin

          sudo curl https://github.com/cloudfoundry/bosh-bootloader/releases/download/v${BBL_CLI_VERSION}/bbl-v${BBL_CLI_VERSION}_linux_amd64 --silent --location --output $install_location/bbl
          sudo chmod +x $install_location/bbl
          bbl --version

          sudo curl https://github.com/cloudfoundry/bosh-cli/releases/download/v${BOSH_CLI_VERSION}/bosh-cli-${BOSH_CLI_VERSION}-linux-amd64 --silent --output $install_location/bosh --location
          sudo chmod +x $install_location/bosh
          bosh --version
  
          sudo apt update
          sudo apt install -y build-essential unzip wamerican

      - name: Checkout cli
        uses: actions/checkout@v7
        with:
          path: cli

      - name: Checkout bosh-bootloader
        uses: actions/checkout@v7
        with:
          repository: cloudfoundry/bosh-bootloader
          path: bosh-bootloader

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Download file from GCS
        run: |
          gcloud storage cp -r gs://cf-cli-bosh-lites/${ENV_NAME} .

      - name: delete bosh
        id: delete-bosh
        timeout-minutes: 30
        continue-on-error: true
        run: |
          cd ${ENV_NAME}/bbl-state
          eval "$(bbl print-env --shell-type posix)"

          # Delete the CF deployment first so warden containers release their
          # bind mounts on the director's persistent disk. --force makes bosh ignore
          # per-instance errors (like a busy unmount) and still delete the
          # deployment record.
          echo "Deleting CF deployment ${BOSH_DEPLOYMENT}"
          bosh delete-deployment -d ${BOSH_DEPLOYMENT} --force || true

          echo "Deleting env ${ENV_NAME}"
          bbl down --no-confirm

      - name: force delete env (fallback)
        if: steps.delete-bosh.outcome == 'failure'
        timeout-minutes: 15
        run: |
          echo "${BBL_GCP_SERVICE_ACCOUNT_KEY}" > /tmp/gcp_key.json
          export BBL_GCP_SERVICE_ACCOUNT_KEY_PATH=/tmp/gcp_key.json
          bash ${GITHUB_WORKSPACE}/cli/.github/bosh-lite-files/force-delete-env.sh "${ENV_NAME}"
          rm -f /tmp/gcp_key.json

      - name: delete gcs bucket
        if: always()
        run: |
          gcloud storage rm -r gs://cf-cli-bosh-lites/${ENV_NAME}

      - name: warn if delete bosh needed the fallback
        if: steps.delete-bosh.outcome == 'failure'
        run: |
          echo "::warning::The graceful 'delete bosh' step failed for ${ENV_NAME} and the environment was torn down via the force-delete-env.sh fallback instead. This usually means an abandoned BOSH task or a warden mount was still busy - see the 'delete bosh' step log for details."